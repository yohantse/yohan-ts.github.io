name: Deploy Safetown to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "safetown/src/**"
      - "safetown/public/**"
      - "safetown/package.json"
      - "safetown/next.config.ts"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: safetown/package-lock.json

      - name: Install dependencies
        working-directory: safetown
        run: npm ci

      - name: Build Next.js static export
        working-directory: safetown
        run: npm run build
        # Output lands in safetown/out/ 
        # With basePath: '/safetown', all asset links are /safetown/_next/...

      - name: Place built files at repo root /safetown-built/
        run: |
          rm -rf safetown-built
          mkdir safetown-built
          cp -r safetown/out/. safetown-built/

      - name: Commit deployed build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add safetown-built/
          git diff --cached --quiet || git commit -m "chore: deploy safetown static export [skip ci]"
          git push
