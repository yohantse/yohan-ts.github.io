name: Deploy Safetown to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "safetown-src/src/**"
      - "safetown-src/public/**"
      - "safetown-src/package.json"
      - "safetown-src/next.config.ts"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: safetown-src/package-lock.json

      - name: Install dependencies
        working-directory: safetown-src
        run: npm ci

      - name: Build Next.js static export
        working-directory: safetown-src
        run: npm run build

      - name: Place built files at repo root /safetown/
        run: |
          rm -rf safetown
          mkdir safetown
          cp -r safetown-src/out/. safetown/

      - name: Commit deployed build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add safetown/
          git diff --cached --quiet || git commit -m "chore: deploy safetown static export [skip ci]"
          git push
